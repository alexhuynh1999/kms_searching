<!DOCTYPE html>

<body class="bg-background font-body text-on-background min-h-screen pb-32">

<nav class="fixed top-0 w-full z-50 bg-[#fff8f5]/80 backdrop-blur-md shadow-[0_20px_40px_rgba(78,41,5,0.06)] flex justify-between items-center px-6 py-4">

<span class="font-headline font-black text-2xl text-[#9c4600] italic tracking-tight">MapleSearch</span>

<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-high text-[#9c4600] hover:scale-105 transition-transform">

<h1 class="text-4xl font-headline font-extrabold text-on-background tracking-tight mb-2">Bossing Mode Search</h1>
<p class="text-on-surface-variant leading-relaxed">Customize your encounter parameters to find the perfect strategy guide.</p>
</header>
<!-- Main Interaction Console -->
<div class="space-y-6 relative z-10">
<!-- Mode Toggle -->
<section class="bg-surface-container-low p-2 rounded-full flex gap-1 shadow-sm">
<button class="flex-1 py-3 rounded-full text-sm font-bold transition-all duration-300 bg-surface-container-highest text-on-surface-variant flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-sm">fitness_center</span>

                </button>
<button class="flex-1 py-3 rounded-full text-sm font-bold transition-all duration-300 bg-gradient-to-br from-primary to-primary-container text-white shadow-lg flex items-center justify-center gap-2">

                    Bossing
                </button>
</section>

<div class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">shield_with_heart</span>
</div>
<span class="font-bold text-on-primary-container">Warrior</span>
</button>
<!-- Mage -->
<button class="bg-surface-container-lowest p-4 rounded-xl flex flex-col items-center gap-3 transition-transform hover:bg-surface-container active:scale-95">
<div class="w-12 h-12 bg-secondary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-3xl">auto_fix_high</span>
</div>
<span class="font-bold text-on-surface-variant">Mage</span>
</button>

<div class="w-12 h-12 bg-tertiary/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-tertiary text-3xl">rebase_edit</span>
</div>
<span class="font-bold text-on-surface-variant">Archer</span>
</button>
<!-- Rogue -->
<button class="bg-surface-container-lowest p-4 rounded-xl flex flex-col items-center gap-3 transition-transform hover:bg-surface-container active:scale-95">
<div class="w-12 h-12 bg-error/10 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-error text-3xl">flare</span>
</div>
<span class="font-bold text-on-surface-variant">Rogue</span>
</button>
</div>
</section>

<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
<span class="absolute bottom-2 left-2 text-white font-bold text-sm">Shadow Lord</span>
</div>
<div class="flex-shrink-0 w-32 h-40 bg-surface-container-highest rounded-lg overflow-hidden relative grayscale opacity-70">

<button class="px-5 py-2 rounded-full bg-surface-container text-on-surface-variant font-bold text-sm transition-colors hover:bg-surface-variant">Normal</button>
<button class="px-5 py-2 rounded-full bg-primary text-white font-bold text-sm shadow-md ring-4 ring-primary/20">Hard</button>
<button class="px-5 py-2 rounded-full bg-surface-container text-on-surface-variant font-bold text-sm transition-colors hover:bg-surface-variant">Extreme</button>

<div class="text-2xl font-bold text-on-surface tracking-tight">

<div class="pt-4">
<button class="w-full py-5 rounded-full bg-gradient-to-r from-[#7c3aed] to-[#f97316] text-white font-headline font-extrabold text-xl shadow-[0_10px_30px_rgba(124,58,237,0.3)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-4">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">search</span>

</div>

<nav class="fixed bottom-0 w-full z-50 bg-[#fff8f5]/90 backdrop-blur-lg shadow-[0_-10px_30px_rgba(78,41,5,0.08)] rounded-t-[3rem] pb-safe">

<button class="flex flex-col items-center justify-center text-[#4e2905]/50 p-4 hover:text-[#9c4600] transition-colors">
<span class="material-symbols-outlined" data-icon="map">map</span>

<button class="flex flex-col items-center justify-center text-[#4e2905]/50 p-4 hover:text-[#9c4600] transition-colors">
